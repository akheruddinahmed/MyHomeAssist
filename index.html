<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#16A34A" />
    <meta name="robots" content="index, follow" />

    <title>MyHouseAssist | Professional Home Deep Cleaning in Bangalore</title>
    <meta
      name="description"
      content="Premium home deep cleaning in Bangalore with verified, background-checked professionals, eco-friendly products, and transparent pricing. Book online in minutes."
    />
    <link rel="canonical" href="https://www.myhouseassist.com/" />

    <!--
      Static Open Graph / Twitter Card defaults (homepage).
      NOTE: link-preview crawlers (WhatsApp, Facebook, X/Twitter) generally
      don't execute JavaScript, so they only ever see this file's tags —
      every shared URL will preview as the homepage. Per-page tags are
      still applied via useDocumentMeta for JS-executing crawlers (Google,
      Bing) and for the browser tab title/description. True per-page social
      previews would need build-time prerendering, which is a reasonable
      future upgrade if that becomes a priority.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MyHouseAssist" />
    <meta property="og:title" content="MyHouseAssist | Professional Home Deep Cleaning in Bangalore" />
    <meta
      property="og:description"
      content="Premium home deep cleaning in Bangalore with verified, background-checked professionals, eco-friendly products, and transparent pricing."
    />
    <meta property="og:url" content="https://www.myhouseassist.com/" />
    <meta property="og:image" content="https://www.myhouseassist.com/og-image.png" />
    <meta property="og:locale" content="en_IN" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MyHouseAssist | Professional Home Deep Cleaning in Bangalore" />
    <meta
      name="twitter:description"
      content="Premium home deep cleaning in Bangalore with verified, background-checked professionals, eco-friendly products, and transparent pricing."
    />
    <meta name="twitter:image" content="https://www.myhouseassist.com/og-image.png" />

    <!-- Preconnect for font performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Site-wide business structured data (doesn't change per route) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "MyHouseAssist",
        "description": "Premium home deep cleaning service in Bangalore with verified, background-checked professionals and transparent pricing.",
        "url": "https://www.myhouseassist.com/",
        "telephone": "+91 70861 49793",
        "priceRange": "₹₹",
        "areaServed": [
          { "@type": "Place", "name": "Bellandur" },
          { "@type": "Place", "name": "Marathahalli" },
          { "@type": "Place", "name": "Whitefield" },
          { "@type": "Place", "name": "Kadubeesanahalli" },
          { "@type": "Place", "name": "HSR Layout" },
          { "@type": "Place", "name": "Sarjapur Road" },
          { "@type": "Place", "name": "Electronic City" },
          { "@type": "Place", "name": "Mahadevapura" },
          { "@type": "Place", "name": "Brookefield" },
          { "@type": "Place", "name": "KR Puram" }
        ],
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Bangalore",
          "addressRegion": "Karnataka",
          "addressCountry": "IN"
        }
      }
    </script>
  </head>
  <body>
    <div id="root">
      <!--
        Minimal inline loading state so first paint isn't a blank white
        screen while JS loads. Pure CSS/HTML, no dependency on the app
        bundle. React replaces this entirely on mount.
      -->
      <style>
        .initial-loader {
          display: flex;
          min-height: 100vh;
          align-items: center;
          justify-content: center;
          background-color: #f8fafc;
        }
        .initial-loader__mark {
          width: 40px;
          height: 40px;
          border-radius: 10px;
          background-color: #16a34a;
          animation: initial-loader-pulse 1s ease-in-out infinite;
        }
        @keyframes initial-loader-pulse {
          0%, 100% { opacity: 1; transform: scale(1); }
          50% { opacity: 0.6; transform: scale(0.92); }
        }
      </style>
      <div class="initial-loader">
        <div class="initial-loader__mark"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
